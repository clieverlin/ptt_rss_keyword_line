name: PTT RSS Keyword Monitor

on:
  schedule:
    - cron: "*/10 * * * *" # 每 10 分鐘自動執行一次
  workflow_dispatch: # 允許在 GitHub 網頁手動觸發執行

permissions:
  contents: write # 關鍵：必須開啟網頁寫入權限，否則無權 commit & push 回去

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run PTT Monitor
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python monitor.py

      - name: Commit and Push state changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen_posts.json
          # 僅在 seen_posts.json 有變化時才 commit & push，避免無異動出錯
          if ! git diff --cached --quiet; then
            git commit -m "chore: Auto-update seen posts state"
            git push
          else
            echo "No new posts detected. State remains unchanged."
          fi
